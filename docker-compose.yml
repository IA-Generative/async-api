
services:
  api:
    image: github.com/titigmr/asyncapi:v0.1.0
    container_name: api
    volumes:
      - ${PWD}/api:/app/api
      - ${PWD}/chart/config:/app/config
      - ${PWD}/migrations:/app/migrations
      - ${PWD}/scripts/entrypoint_dev.sh:/app/entrypoint.sh
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
    - "8080:8000"
    depends_on:
    - db
    - broker
    env_file:
    - .env.example
    environment:
      - APP=api

  listener:
    image: github.com/titigmr/asyncapi:v0.1.0
    container_name: listener
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ${PWD}/api:/app/api
      - ${PWD}/listener:/app/listener
      - ${PWD}/chart/config:/app/config
      - ${PWD}/scripts/entrypoint_dev.sh:/app/entrypoint.sh
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    depends_on:
    - db
    - broker
    env_file:
    -  .env.example
    environment:
      - APP=listener

  consumer:
    image: github.com/titigmr/consumer:v0.1.0
    container_name: consumer
    volumes:
     - ${PWD}/workers/js/index.js:/app/index.js
    build:
      context: ./workers/js
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    depends_on:
      - db
      - broker
    env_file:
      -  .env.example

  db:
    image: postgres:17
    volumes:
      - db-data:/var/lib/postgresql/data
    env_file:
      -  .env.example
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tasks
    ports:
      - "5433:5432"

  broker:
    image: rabbitmq:management
    container_name: rabbitmq
    volumes:
      - broker-lib:/var/lib/rabbitmq
      - broker-log:/var/log/rabbitmq
    restart: always
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: kalo
      RABBITMQ_DEFAULT_PASS: kalo

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    env_file:
      - .env.example
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 $$S3_ACCESS_KEY $$S3_SECRET_KEY;
      mc mb --ignore-existing myminio/$$S3_BUCKET_NAME;
      mc ilm rule add myminio/$$S3_BUCKET_NAME --expire-days 1;
      exit 0;
      "

volumes:
  db-data:
    driver: local
  broker-lib:
    driver: local
  broker-log:
    driver: local
  minio-data:
    driver: local
