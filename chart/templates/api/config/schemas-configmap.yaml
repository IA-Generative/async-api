{{- if .Files.Glob "config/schemas/*.json" -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-%s" (include "helper.fullname" .) "schemas-config" }}
  labels:
    {{- include "helper.labels" (dict "root" . "componentName" "config") | nindent 4 }}
    app.kubernetes.io/component: configuration
    async-api.io/config-type: schemas
data:
{{- range $path, $_ := .Files.Glob "config/schemas/*.json" }}
  {{ base $path }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- end -}}
