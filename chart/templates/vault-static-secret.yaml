{{- if .Values.vault.enabled }}
# VaultStaticSecret : synchronise le secret Vault (identifiants DB) vers un Secret Kubernetes.
# Le Vault Secrets Operator (VSO) doit être installé sur le cluster et VaultAuth configuré (vaultAuthRef).
# Le Secret créé a le même nom que db.secretName pour que CloudNativePG et le backend l'utilisent sans changement.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: async-api-psql-user
  labels:
    {{- include "async-api.labels" . | nindent 4 }}
spec:
  vaultAuthRef: {{ .Values.vault.vaultAuthRef | quote }}
  mount: {{ .Values.vault.mount | quote }}
  type: {{ .Values.vault.type | quote }}
  path: {{ .Values.vault.pathApp | quote }}
  refreshAfter: {{ .Values.vault.refreshAfter | quote }}
  destination:
    create: true
    name: {{ .Values.cnpg.credentials.existingSecrets.app.secretName | quote }}
    type: kubernetes.io/basic-auth
{{- end }}
