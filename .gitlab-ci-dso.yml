include:
  - project: $CATALOG_PATH
    file:
      - vault-ci.yml
      - kaniko-ci.yml
    ref: main

default:
    image: alpine:latest

variables:
    REGISTRY_URL: "${IMAGE_REPOSITORY}"
    DOCKERFILE: Dockerfile

stages:
  - read-secret
  - docker-build

read_secret:
  stage: read-secret
  only:
    - tags
  extends:
    - .vault:read_secret

docker-build:async-api:
  stage: docker-build
  needs: ["read_secret"]
  only:
    - tags
  variables:
    WORKING_DIR: "."
    IMAGE_NAME: async-api
    TAG: "${CI_COMMIT_TAG}"
  extends:
    - .kaniko:simple-build-push

docker-build:consumer:
  stage: docker-build
  needs: ["read_secret"]
  only:
    - tags
  variables:
    WORKING_DIR: ./workers/js
    DOCKERFILE: ./workers/js/Dockerfile
    IMAGE_NAMES: "async-api-consumer:${CI_COMMIT_TAG}"
  extends:
    - .kaniko:build-push